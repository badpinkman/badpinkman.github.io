<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JESSE — 个人数据档案 · 世界线记录">
  <title>JESSE // WORLD LINE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --bg:           #04040a;
      --surface:      rgba(6, 8, 18, 0.96);
      --cyan:         #00f5e9;
      --purple:       #c05cf5;
      --pink:         #ff2d78;
      --text:         #7a8fa0;
      --text-bright:  #c8dce8;
      --text-dim:     #232d3a;
      --line-x:       18px;      /* X position of the timeline axis */
      --indent:       46px;      /* content indent from left */
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    /* ── Body ──────────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* ── Grid texture ──────────────────────────────────────── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 245, 233, 0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 233, 0.028) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
      z-index: 0;
    }

    /* Vignette */
    .bg-vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Boot scan line ────────────────────────────────────── */
    .scan-sweep {
      position: fixed;
      inset-inline: 0;
      top: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--cyan) 40%, var(--cyan) 60%, transparent 100%);
      box-shadow: 0 0 18px var(--cyan), 0 0 40px rgba(0, 245, 233, 0.4);
      pointer-events: none;
      z-index: 500;
      animation: boot-scan 1.6s cubic-bezier(0.4, 0, 0.8, 1) forwards;
    }
    @keyframes boot-scan {
      from { transform: translateY(0);    opacity: 0.9; }
      to   { transform: translateY(100vh); opacity: 0;   }
    }

    /* ── Layout ────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      padding: 84px 0 72px;
    }

    .sys-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 9px;
      letter-spacing: 0.42em;
      color: var(--cyan);
      opacity: 0.5;
      margin-bottom: 22px;
    }
    .sys-badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan), 0 0 14px rgba(0,245,233,0.4);
      animation: dot-pulse 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }

    .header-name {
      font-family: 'Orbitron', monospace;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.09em;
      line-height: 1;
      position: relative;
      display: inline-block;
      text-shadow:
        0 0 24px rgba(0, 245, 233, 0.35),
        0 0 60px rgba(0, 245, 233, 0.08);
    }

    /* Glitch layers */
    .header-name::before,
    .header-name::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      width: 100%;
    }
    .header-name::before {
      color: var(--cyan);
      opacity: 0;
      clip-path: polygon(0 22%, 100% 22%, 100% 42%, 0 42%);
      animation: glitch-top 8s 1s infinite;
    }
    .header-name::after {
      color: var(--pink);
      opacity: 0;
      clip-path: polygon(0 60%, 100% 60%, 100% 76%, 0 76%);
      animation: glitch-bot 8s 1.08s infinite;
    }
    @keyframes glitch-top {
      0%, 85%, 100% { opacity: 0; transform: none; }
      87%  { opacity: 0.85; transform: translate(-3px, 0) skewX(-0.5deg); }
      89%  { opacity: 0.85; transform: translate(2px, 0);  }
      91%  { opacity: 0; }
    }
    @keyframes glitch-bot {
      0%, 86%, 100% { opacity: 0; transform: none; }
      88%  { opacity: 0.65; transform: translate(3px, 0); }
      90%  { opacity: 0.65; transform: translate(-1px, 0); }
      92%  { opacity: 0; }
    }

    .header-tagline {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 0;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
    }
    .prompt-char {
      color: var(--cyan);
      margin-right: 7px;
      opacity: 0.7;
    }
    .divergence-num {
      color: var(--text);
    }
    .caret {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--cyan);
      margin-left: 3px;
      vertical-align: middle;
      animation: caret-blink 1.05s step-end infinite;
    }
    @keyframes caret-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Timeline ──────────────────────────────────────────── */
    .timeline {
      position: relative;
      padding-bottom: 80px;
    }

    /* The axis line */
    .timeline::before {
      content: '';
      position: absolute;
      left: var(--line-x);
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        var(--cyan) 4%,
        var(--cyan) 96%,
        transparent 100%
      );
      box-shadow:
        0 0 5px var(--cyan),
        0 0 14px rgba(0, 245, 233, 0.18),
        0 0 30px rgba(0, 245, 233, 0.05);
    }

    /* ── Reveal animation base ─────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    /* ── Year Marker ───────────────────────────────────────── */
    .year-marker {
      position: relative;
      padding: 48px 0 16px var(--indent);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .year-marker::before {
      content: '';
      position: absolute;
      left: calc(var(--line-x) - 5px);
      top: calc(48px + 5px);
      width: 11px;
      height: 11px;
      border: 1.5px solid var(--cyan);
      background: var(--bg);
      box-shadow: 0 0 8px var(--cyan), 0 0 20px rgba(0,245,233,0.2);
      transform: rotate(45deg);
    }
    .year-label {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      letter-spacing: 0.55em;
      color: var(--cyan);
      opacity: 0.6;
    }
    .year-rule {
      flex: 1;
      height: 1px;
      background: linear-gradient(
        to right,
        rgba(0, 245, 233, 0.22) 0%,
        transparent 60%
      );
    }

    /* ── Content Node ──────────────────────────────────────── */
    .timeline-node {
      position: relative;
      padding: 0 0 26px var(--indent);
    }

    /* Axis dot */
    .timeline-node::before {
      content: '';
      position: absolute;
      left: calc(var(--line-x) - 4px);
      top: 22px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1.5px solid var(--cyan);
      background: var(--bg);
      transition: background 0.25s, box-shadow 0.25s;
    }
    .timeline-node:hover::before {
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan), 0 0 20px rgba(0,245,233,0.35);
    }
    .timeline-node.type-project::before {
      border-color: var(--purple);
    }
    .timeline-node.type-project:hover::before {
      background: var(--purple);
      box-shadow: 0 0 8px var(--purple), 0 0 20px rgba(192,92,245,0.35);
    }

    /* Card */
    .node-card {
      position: relative;
      background: var(--surface);
      border: 1px solid rgba(0, 245, 233, 0.09);
      padding: 20px 22px 18px;
      overflow: hidden;
      transition:
        border-color 0.3s,
        box-shadow 0.3s,
        transform 0.25s;
    }
    .node-card:hover {
      border-color: rgba(0, 245, 233, 0.3);
      box-shadow:
        0 0 24px rgba(0, 245, 233, 0.06),
        inset 0 1px 0 rgba(0,245,233,0.06);
      transform: translateX(4px);
    }

    /* Left accent */
    .node-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 2px;
      height: 100%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan), 0 0 16px rgba(0,245,233,0.3);
    }

    /* Corner cut */
    .node-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 14px;
      height: 14px;
      border-top: 1px solid rgba(0,245,233,0.2);
      border-right: 1px solid rgba(0,245,233,0.2);
    }

    /* Project variant */
    .type-project .node-card {
      border-color: rgba(192, 92, 245, 0.09);
    }
    .type-project .node-card:hover {
      border-color: rgba(192, 92, 245, 0.3);
      box-shadow:
        0 0 24px rgba(192, 92, 245, 0.06),
        inset 0 1px 0 rgba(192,92,245,0.06);
    }
    .type-project .node-card::before {
      background: var(--purple);
      box-shadow: 0 0 8px var(--purple), 0 0 16px rgba(192,92,245,0.3);
    }
    .type-project .node-card::after {
      border-color: rgba(192,92,245,0.2);
    }

    /* Card content */
    .node-tag {
      font-size: 8px;
      letter-spacing: 0.4em;
      color: var(--cyan);
      opacity: 0.55;
      margin-bottom: 9px;
    }
    .type-project .node-tag { color: var(--purple); }

    .node-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 0.04em;
      margin-bottom: 5px;
      line-height: 1.3;
    }
    .node-date {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      margin-bottom: 11px;
    }
    .node-desc {
      font-size: 11px;
      line-height: 1.9;
      color: var(--text);
    }
    .node-cover {
      display: block;
      width: 100%;
      height: 160px;
      object-fit: cover;
      margin-top: 16px;
      border: 1px solid rgba(0, 245, 233, 0.07);
      filter: saturate(0.55) brightness(0.7);
      transition: filter 0.4s;
    }
    .node-card:hover .node-cover {
      filter: saturate(0.85) brightness(0.88);
    }
    .node-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 9px;
      letter-spacing: 0.28em;
      color: var(--purple);
      text-decoration: none;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .node-link:hover {
      color: #fff;
      text-shadow: 0 0 10px var(--purple);
    }

    /* ── Silence Node ──────────────────────────────────────── */
    .silence-node {
      position: relative;
      padding: 0 0 22px var(--indent);
    }

    /* Small dim marker */
    .silence-node::before {
      content: '◦';
      position: absolute;
      left: calc(var(--line-x) - 5px);
      top: 5px;
      font-size: 11px;
      color: var(--text-dim);
      transition: color 0.3s, text-shadow 0.3s;
    }
    .silence-node:hover::before,
    .silence-node.open::before {
      color: var(--pink);
      text-shadow: 0 0 8px var(--pink);
    }

    .silence-trigger {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 4px 0;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .silence-range {
      font-size: 8px;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      white-space: nowrap;
      transition: color 0.3s;
    }
    .silence-node:hover .silence-range,
    .silence-node.open  .silence-range {
      color: rgba(255, 45, 120, 0.5);
    }
    .silence-dash-line {
      flex: 1;
      height: 1px;
      background: repeating-linear-gradient(
        90deg,
        var(--text-dim) 0, var(--text-dim) 3px,
        transparent 3px, transparent 10px
      );
      opacity: 0.18;
      transition: opacity 0.3s;
    }
    .silence-node:hover .silence-dash-line,
    .silence-node.open  .silence-dash-line { opacity: 0.38; }

    /* Expand/collapse */
    .silence-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .silence-node:hover .silence-body,
    .silence-node.open  .silence-body { grid-template-rows: 1fr; }

    .silence-inner { overflow: hidden; }

    .silence-note-box {
      margin-top: 8px;
      padding: 11px 15px;
      border-left: 1px solid rgba(255, 45, 120, 0.22);
      background: rgba(255, 45, 120, 0.03);
    }
    .silence-note-text {
      font-size: 11px;
      font-style: italic;
      color: rgba(255, 45, 120, 0.6);
      line-height: 1.7;
    }
    .silence-empty-text {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
    }

    /* ── Footer ────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      padding-bottom: 56px;
    }
    .footer-inner {
      max-width: 780px;
      margin: 0 auto;
      padding: 28px 28px 0;
      border-top: 1px solid rgba(0, 245, 233, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-sig {
      font-size: 8px;
      letter-spacing: 0.35em;
      color: var(--text-dim);
    }
    .footer-links {
      display: flex;
      gap: 22px;
      list-style: none;
    }
    .footer-links a {
      font-size: 8px;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s, text-shadow 0.2s;
    }
    .footer-links a:hover {
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 600px) {
      .page { padding: 0 20px; }
      header { padding: 60px 0 56px; }
      :root { --line-x: 14px; --indent: 38px; }
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-grid"     aria-hidden="true"></div>
<div class="bg-vignette" aria-hidden="true"></div>
<div class="scan-sweep"  aria-hidden="true"></div>

<!-- ── Header ──────────────────────────────────────────────── -->
<div class="page">
  <header>
    <div class="sys-badge">
      <span class="sys-badge-dot"></span>
      PERSONAL DATA ARCHIVE · WORLD LINE RECORD
    </div>

    <h1 class="header-name" data-text="JESSE">JESSE</h1>

    <p class="header-tagline">
      <span class="prompt-char" aria-hidden="true">></span>
      <span>世界线变动率 · <span id="divergence">0.337187</span>%</span>
      <span class="caret" aria-hidden="true"></span>
    </p>
  </header>

  <!-- ── Timeline ──────────────────────────────────────────── -->
  <main class="timeline" id="timeline" role="list" aria-label="时间轴记录"></main>
</div>

<!-- ── Footer ────────────────────────────────────────────────── -->
<footer>
  <div class="footer-inner">
    <span class="footer-sig">// EOF · SYSTEM ACTIVE</span>
    <ul class="footer-links">
      <li><a href="https://github.com/badpinkman" target="_blank" rel="noopener">GITHUB</a></li>
    </ul>
  </div>
</footer>

<!-- Timeline data -->
<script src="data/timeline.js"></script>

<script>
(function () {
  'use strict';

  var MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN',
                'JUL','AUG','SEP','OCT','NOV','DEC'];

  function fmtDate(str) {
    var parts = str.split('-');
    var y = parts[0], m = parts[1];
    return m ? MONTHS[+m - 1] + ' ' + y : y;
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  /* ── Group by year ──────────────────────────────────────── */
  var byYear = {};
  var data = (typeof TIMELINE_DATA !== 'undefined') ? TIMELINE_DATA : [];

  data.forEach(function (item) {
    var y = item.date.slice(0, 4);
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(item);
  });

  var years = Object.keys(byYear).sort(function (a, b) { return b - a; });

  /* ── Build DOM ──────────────────────────────────────────── */
  var timeline = document.getElementById('timeline');
  var frag = document.createDocumentFragment();

  years.forEach(function (year) {
    /* Year marker */
    var ym = document.createElement('div');
    ym.className = 'year-marker reveal';
    ym.setAttribute('role', 'listitem');
    ym.setAttribute('aria-label', year + '年');
    ym.innerHTML =
      '<span class="year-label">' + esc(year) + '</span>' +
      '<div class="year-rule" aria-hidden="true"></div>';
    frag.appendChild(ym);

    byYear[year].forEach(function (item) {

      if (item.type === 'silence') {
        /* Silence node */
        var range = item.dateTo
          ? fmtDate(item.date) + ' &rarr; ' + fmtDate(item.dateTo)
          : fmtDate(item.date);

        var sn = document.createElement('div');
        sn.className = 'silence-node reveal';
        sn.setAttribute('role', 'listitem');
        sn.innerHTML =
          '<div class="silence-trigger" tabindex="0" role="button" ' +
              'aria-expanded="false" aria-label="空白期：' + range.replace('&rarr;', '→') + '">' +
            '<span class="silence-range">' + range + '</span>' +
            '<div class="silence-dash-line" aria-hidden="true"></div>' +
          '</div>' +
          '<div class="silence-body">' +
            '<div class="silence-inner">' +
              '<div class="silence-note-box">' +
                (item.note
                  ? '<p class="silence-note-text">&ldquo;' + esc(item.note) + '&rdquo;</p>'
                  : '<p class="silence-empty-text">// no log entry</p>'
                ) +
              '</div>' +
            '</div>' +
          '</div>';

        /* Click / keyboard toggle (for touch & accessibility) */
        var trigger = sn.querySelector('.silence-trigger');
        trigger.addEventListener('click', function () {
          var open = sn.classList.toggle('open');
          trigger.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        trigger.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            trigger.click();
          }
        });

        frag.appendChild(sn);

      } else {
        /* Content node (photo / project) */
        var isProject = item.type === 'project';

        var coverHtml = item.cover
          ? '<img class="node-cover" src="' + esc(item.cover) + '" alt="' + esc(item.title) + '" loading="lazy">'
          : '';

        var linkHtml = item.link
          ? '<a class="node-link" href="' + esc(item.link) + '" target="_blank" rel="noopener">' +
              '&rarr; VIEW SOURCE' +
            '</a>'
          : '';

        var cn = document.createElement('div');
        cn.className = 'timeline-node type-' + item.type + ' reveal';
        cn.setAttribute('role', 'listitem');
        cn.innerHTML =
          '<div class="node-card">' +
            '<div class="node-tag">' + (isProject ? 'PROJECT_LOG' : 'PHOTO_LOG') + '</div>' +
            '<div class="node-title">' + esc(item.title) + '</div>' +
            '<div class="node-date">' + fmtDate(item.date) + '</div>' +
            '<div class="node-desc">' + esc(item.description) + '</div>' +
            coverHtml +
            linkHtml +
          '</div>';

        frag.appendChild(cn);
      }
    });
  });

  timeline.appendChild(frag);

  /* ── Scroll reveal ──────────────────────────────────────── */
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });

  document.querySelectorAll('.reveal').forEach(function (el) {
    observer.observe(el);
  });

  /* ── World-line divergence counter ─────────────────────── */
  var divEl = document.getElementById('divergence');
  var val = 0.337187;
  setInterval(function () {
    val += (Math.random() - 0.5) * 0.000002;
    val = Math.max(0.1, Math.abs(val));
    divEl.textContent = val.toFixed(6);
  }, 3200);

}());
</script>
</body>
</html>
